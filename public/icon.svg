<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E66A2A" />
      <stop offset="100%" stop-color="#D35400" />
    </linearGradient>
    <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A4A4A" />
      <stop offset="100%" stop-color="#1A1A1A" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#E66A2A" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- White Background -->
  <rect width="1024" height="1024" fill="#FFFFFF" />

  <g filter="url(#shadow)" transform="translate(0, 50)">
    
    <!-- Trailer Body (The big container) -->
    <rect x="280" y="400" width="640" height="330" rx="16" fill="#FFFFFF" stroke="#E66A2A" stroke-width="8" />
    
    <!-- Grid lines on Trailer Body -->
    <path d="M 280 482 L 920 482 M 280 564 L 920 564 M 280 646 L 920 646" stroke="#E66A2A" stroke-width="2" opacity="0.3" />
    <path d="M 440 400 L 440 730 M 600 400 L 600 730 M 760 400 L 760 730" stroke="#E66A2A" stroke-width="2" opacity="0.3" />

    <!-- Trailer Base/Chassis -->
    <rect x="250" y="730" width="670" height="40" rx="8" fill="#E66A2A" />
    
    <!-- Truck Cab -->
    <path d="M 80 770 L 80 530 C 80 490 110 460 150 460 L 220 460 L 260 400 L 280 400 L 280 770 Z" fill="url(#truckGrad)" />
    
    <!-- Cab Window -->
    <path d="M 100 500 C 100 480 110 480 130 480 L 200 480 L 240 420 L 260 420 L 260 580 L 100 580 Z" fill="#FFFFFF" opacity="0.9" />
    
    <!-- Cab Details (Grill, Lights) -->
    <rect x="80" y="650" width="30" height="80" rx="5" fill="#A04000" />
    <circle cx="95" cy="610" r="10" fill="#FFD700" />
    
    <!-- Wheels -->
    <!-- Cab Wheel -->
    <circle cx="180" cy="770" r="55" fill="url(#wheelGrad)" />
    <circle cx="180" cy="770" r="30" fill="#E0E0E0" />
    <circle cx="180" cy="770" r="12" fill="#1A1A1A" />
    
    <!-- Trailer Wheels -->
    <circle cx="680" cy="770" r="55" fill="url(#wheelGrad)" />
    <circle cx="680" cy="770" r="30" fill="#E0E0E0" />
    <circle cx="680" cy="770" r="12" fill="#1A1A1A" />
    
    <circle cx="820" cy="770" r="55" fill="url(#wheelGrad)" />
    <circle cx="820" cy="770" r="30" fill="#E0E0E0" />
    <circle cx="820" cy="770" r="12" fill="#1A1A1A" />

    <!-- Text on Trailer -->
    <text x="600" y="600" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="110" fill="#6E2C00" text-anchor="middle" letter-spacing="2">RAAHYODHA</text>

    <!-- Basketball Globe on Top -->
    <g transform="translate(600, 280)">
      <circle cx="0" cy="0" r="80" fill="#D35400" />
      <!-- Globe/Basketball lines -->
      <path d="M -80 0 A 80 80 0 0 0 80 0" fill="none" stroke="#FFFFFF" stroke-width="6" />
      <path d="M 0 -80 A 80 80 0 0 0 0 80" fill="none" stroke="#FFFFFF" stroke-width="6" />
      <path d="M -55 -55 A 80 80 0 0 1 -55 55" fill="none" stroke="#FFFFFF" stroke-width="6" />
      <path d="M 55 -55 A 80 80 0 0 0 55 55" fill="none" stroke="#FFFFFF" stroke-width="6" />
    </g>
  </g>
</svg>
