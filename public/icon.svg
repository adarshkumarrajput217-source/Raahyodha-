<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" /> <!-- slate-900 -->
      <stop offset="100%" stop-color="#1e3a8a" /> <!-- blue-900 -->
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f97316" /> <!-- orange-500 -->
      <stop offset="100%" stop-color="#eab308" /> <!-- yellow-500 -->
    </linearGradient>
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Shield/Badge Base -->
  <path d="M 512 50 L 850 200 L 850 600 C 850 800 650 920 512 980 C 374 920 174 800 174 600 L 174 200 Z" fill="url(#bgGrad)" filter="url(#dropShadow)" />
  
  <!-- Inner Shield Border -->
  <path d="M 512 80 L 820 220 L 820 590 C 820 770 640 880 512 940 C 384 880 204 770 204 590 L 204 220 Z" fill="none" stroke="#f97316" stroke-width="12" opacity="0.8" />

  <!-- Rising Sun -->
  <circle cx="512" cy="450" r="180" fill="url(#sunGrad)" filter="url(#glow)" />

  <!-- Highway / Road -->
  <path d="M 512 450 L 820 850 L 204 850 Z" fill="#334155" />
  <!-- Road Lines -->
  <path d="M 512 450 L 512 850" stroke="#ffffff" stroke-width="16" stroke-dasharray="40, 30" opacity="0.8" />

  <!-- Truck Front View -->
  <g transform="translate(0, 50)">
    <!-- Tires -->
    <rect x="360" y="620" width="60" height="100" rx="15" fill="#0f172a" />
    <rect x="604" y="620" width="60" height="100" rx="15" fill="#0f172a" />
    
    <!-- Main Body -->
    <path d="M 380 350 L 644 350 C 660 350 670 360 674 380 L 700 550 C 704 580 680 600 650 600 L 374 600 C 344 600 320 580 324 550 L 350 380 C 354 360 364 350 380 350 Z" fill="url(#truckGrad)" filter="url(#dropShadow)" />
    
    <!-- Windshield -->
    <path d="M 400 380 L 624 380 C 630 380 635 385 638 395 L 654 470 C 656 480 650 490 640 490 L 384 490 C 374 490 368 480 370 470 L 386 395 C 389 385 394 380 400 380 Z" fill="#0f172a" />
    <!-- Windshield Reflection -->
    <path d="M 400 380 L 500 380 L 450 490 L 384 490 Z" fill="#ffffff" opacity="0.15" />

    <!-- Grill -->
    <rect x="440" y="510" width="144" height="60" rx="8" fill="#1e293b" />
    <line x1="460" y1="525" x2="564" y2="525" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" />
    <line x1="460" y1="540" x2="564" y2="540" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" />
    <line x1="460" y1="555" x2="564" y2="555" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" />

    <!-- Headlights -->
    <circle cx="390" cy="540" r="18" fill="#fef08a" filter="url(#glow)" />
    <circle cx="634" cy="540" r="18" fill="#fef08a" filter="url(#glow)" />
    
    <!-- Bumper -->
    <rect x="350" y="580" width="324" height="30" rx="10" fill="#475569" />
  </g>

  <!-- Text "RAAHYODHA" -->
  <text x="512" y="820" font-family="'Inter', 'Arial Black', sans-serif" font-weight="900" font-size="95" fill="#ffffff" text-anchor="middle" letter-spacing="4" filter="url(#dropShadow)">RAAHYODHA</text>
  <!-- Subtitle -->
  <text x="512" y="880" font-family="'Inter', sans-serif" font-weight="600" font-size="32" fill="#f97316" text-anchor="middle" letter-spacing="8">HIGHWAY WARRIOR</text>
</svg>
